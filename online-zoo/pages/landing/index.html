<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <link rel="stylesheet" href="../../assets/css/common.css" >
    <link rel="stylesheet" href="./styles.css" >
    <script src="./script.js" defer></script>
    <title>Online-zoo</title>
    <link
      href="https://fonts.googleapis.com/css?family=Montserrat:100,200,300,regular,500,600,700,800,900,100italic,200italic,300italic,italic,500italic,600italic,700italic,800italic,900italic"
      rel="stylesheet"
    >
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="left-side">
          <img src="../../assets/images/Logo.svg" alt="logo" >
        </div>
        <div class="right-side">
          <nav>
            <ul>
              <li><a href="#about">ABOUT</a></li>
              <li><a href="#map">MAP</a></li>
              <li><a href="#zoos">ZOOS</a></li>
              <li><a href="#contact">CONTACT US</a></li>
              <li><a href="#design">DESIGN</a></li>
            </ul>
          </nav>
          <div class="social-icons">
            <a
              href="https://www.youtube.com/"
              target="_blank"
              rel="noopener noreferrer"
            >
              <img src="../../assets/icons/YouTube.svg" alt="YouTube icon" >
            </a>
            <a
              href="https://www.instagram.com/"
              target="_blank"
              rel="noopener noreferrer"
            >
              <img
                src="../../assets/icons/Instagram.svg"
                alt="Instagram icon"
              >
            </a>
            <a
              href="https://www.facebook.com/"
              target="_blank"
              rel="noopener noreferrer"
            >
              <img src="../../assets/icons/Facebook.svg" alt="Facebook icon" >
            </a>
          </div>
        </div>
      </div>
    </header>
    <main class="main">
      <section class="bg-img bg-img1">
        <div class="container">
          <div class="hero">
            <h1>Watch your favorite animal online</h1>
            <p class="description">
              Explore the exciting and mysterious world of wild animals in a
              natural setting without leaving your home.
            </p>

            <button class="btn btn-orange">
              VIEW LIVE CAM
              <img src="../../assets/icons/Union.svg" alt="union icon" >
            </button>
          </div>
        </div>
      </section>
    </main>
    <footer class="footer">
      <div class="container"></div>
    </footer>
  </body>
</html>
